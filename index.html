<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burpey Server Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0A0E1A;
            color: #E0E0E0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px;
            max-width: 480px;
            width: 90%;
            text-align: center;
        }
        .logo { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #fff; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
        .status-row {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; margin-bottom: 24px;
        }
        .dot {
            width: 14px; height: 14px; border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .dot.running { background: #4CAF50; box-shadow: 0 0 12px #4CAF50; }
        .dot.stopped { background: #F44336; box-shadow: 0 0 12px #F44336; }
        .dot.unknown { background: #FF9800; box-shadow: 0 0 12px #FF9800; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }
        .status-text { font-size: 18px; font-weight: 600; }
        .status-text.running { color: #4CAF50; }
        .status-text.stopped { color: #F44336; }
        .status-text.unknown { color: #FF9800; }
        .url-box {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #64B5F6;
            word-break: break-all;
            margin-bottom: 16px;
        }
        .meta { color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🍼</div>
        <h1>Burpey</h1>
        <p class="subtitle">Baby Cry Classification Server</p>
        <div class="status-row">
            <div class="dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Checking...</span>
        </div>
        <div class="url-box" id="urlBox">Loading...</div>
        <p class="meta" id="metaInfo">—</p>
    </div>
    <script>
        async function fetchStatus() {
            try {
                const resp = await fetch('./status.json?' + Date.now());
                const data = await resp.json();
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                const url = document.getElementById('urlBox');
                const meta = document.getElementById('metaInfo');

                const s = data.status || 'unknown';
                dot.className = 'dot ' + s;
                text.className = 'status-text ' + s;
                text.textContent = s.charAt(0).toUpperCase() + s.slice(1);
                url.textContent = data.tunnel_url || 'No tunnel active';
                meta.textContent = data.updated_at
                    ? 'Last updated: ' + new Date(data.updated_at).toLocaleString()
                    : '—';
            } catch (e) {
                document.getElementById('statusText').textContent = 'Offline';
                document.getElementById('statusDot').className = 'dot stopped';
            }
        }
        fetchStatus();
        setInterval(fetchStatus, 15000);
    </script>
</body>
</html>
